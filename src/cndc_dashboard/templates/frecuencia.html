<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>FRECUENCIA DEL SIN</title>
    <link rel="stylesheet" href="/static/css/fullscreen-dashboard.css" />
    <script src="/static/vendor/plotly.min.js"></script>
  </head>
  <body class="frequency-page" data-page="frecuencia">
    <header class="top-bar">
      <h1>FRECUENCIA DEL SIN</h1>
      <div class="top-controls">
        <button id="refreshButton" class="compact-button" type="button">Actualizar ahora</button>
      </div>
    </header>
    <section class="frequency-summary" aria-live="polite">
      <div><span class="frequency-summary-label">ÚLTIMA FRECUENCIA:</span> <strong id="lastFrequency" class="frequency-summary-value">--</strong></div>
      <div><span class="frequency-summary-label">HORA:</span> <strong id="lastFrequencyTime" class="frequency-summary-value">--</strong></div>
      <div><span class="frequency-summary-label">ESTADO:</span> <strong id="frequencyState" class="frequency-summary-value">--</strong></div>
    </section>
    <main class="chart-area">
      <div id="chart" class="plot-container"></div>
    </main>
    <footer id="technicalMetadata" class="technical-metadata" title="Fuente técnica interna: API">
      <span>FECHA DE OPERACIÓN: --</span>
      <span>ESTADO: CARGANDO</span>
      <span>ÚLTIMA ACTUALIZACIÓN: --</span>
      <span>FUENTE: CNDC</span>
    </footer>
    <div id="statusToast" class="status-toast" aria-live="polite"></div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/frecuencia.js"></script>
  </body>
</html>
